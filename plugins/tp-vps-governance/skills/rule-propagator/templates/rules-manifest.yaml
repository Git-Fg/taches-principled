# VPS Governance — Rules Manifest
# Maps shared rules to agent patterns for frontmatter injection.
#
# Reference: /rule-propagator init to initialize
#            /rule-propagator apply --yes to sync
#            /rule-propagator status to check drift

manifest_version: "1.0"
last_sync: null  # ISO 8601 timestamp, updated on each apply

shared_rules:
  skill_path: "skills/shared-rules/SKILL.md"
  description: "Core project rules injected into all subagents"

agent_patterns:
  - pattern: "agents/*.md"
    paths:
      - "plugins/*/agents/*.md"
    inject:
      - "skills/shared-rules/SKILL.md"
    description: "Plugin-level agents"

  - pattern: "skills/*/agents/*.md"
    paths:
      - "plugins/*/skills/*/agents/*.md"
    inject:
      - "skills/shared-rules/SKILL.md"
    description: "Skill-level agents"

  # Add custom patterns below:
  # - pattern: "path/to/custom/agents/*.md"
  #   inject:
  #     - "skills/shared-rules/SKILL.md"

settings:
  dry_run_by_default: true
  conflict_detection: true
  backup_before_modify: true